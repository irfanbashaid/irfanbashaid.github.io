<html>
    <head>
        <title>MSME Blokchain program</title>
        <script src="https://cdn.jsdelivr.net/npm/web3@4.16.0/dist/web3.min.js"></script>
    </head>
    <body>
        Ethereum based voting platform
        <div>
            <p>Wallet Address: <span id="walletAddressId"></span></p>
            <p>Wallet Balance: <span id="walletBalanceId"></span> ETH</p>
        </div>
        <div id="parentDiv">
            <div id="trumpdivid">
                <p>TRUMP</p>
                <img src="https://upload.wikimedia.org/wikipedia/commons/1/13/Official_Presidential_Portrait_of_President_Donald_J._Trump_%282025%29_%28cropped%29%282%29.jpg" alt="">
                <p>No.of votes so far: <span id="trumpVoteCount"></span> </p>
                <button onclick="voting('TRUMP')">VOTE</button>
            </div>
            <div id="bidendivid">
                <p>BIDEN</p>
                <img src="https://upload.wikimedia.org/wikipedia/commons/6/68/Joe_Biden_presidential_portrait.jpg" alt="">
                <p>No.of votes so far: <span id="bidenVoteCount"></span> </p>
                <button onclick="voting('BIDEN')">VOTE</button>
            </div>
        </div>
        <div>
            <button style="background-color: brown;color: white;" onclick="result()">Result</button>
        </div>
        <script>
            let walletAddress;
            let web3Ins;
            let votingCOntractAddress = "0xd8a657c85bb04db84c5f8dc664b218c30d9b30ca";
            let abi = [
                {
                    "constant": false,
                    "inputs": [],
                    "name": "startVoting",
                    "outputs": [],
                    "payable": false,
                    "stateMutability": "nonpayable",
                    "type": "function"
                },
                {
                    "constant": false,
                    "inputs": [
                        {
                            "internalType": "string",
                            "name": "candName",
                            "type": "string"
                        }
                    ],
                    "name": "voting",
                    "outputs": [],
                    "payable": false,
                    "stateMutability": "nonpayable",
                    "type": "function"
                },
                {
                    "inputs": [],
                    "payable": false,
                    "stateMutability": "nonpayable",
                    "type": "constructor"
                },
                {
                    "constant": true,
                    "inputs": [],
                    "name": "getBlockchainTime",
                    "outputs": [
                        {
                            "internalType": "uint256",
                            "name": "",
                            "type": "uint256"
                        }
                    ],
                    "payable": false,
                    "stateMutability": "view",
                    "type": "function"
                },
                {
                    "constant": true,
                    "inputs": [
                        {
                            "internalType": "string",
                            "name": "_candidateName",
                            "type": "string"
                        }
                    ],
                    "name": "noOfVotes",
                    "outputs": [
                        {
                            "internalType": "uint256",
                            "name": "",
                            "type": "uint256"
                        }
                    ],
                    "payable": false,
                    "stateMutability": "view",
                    "type": "function"
                },
                {
                    "constant": true,
                    "inputs": [],
                    "name": "result",
                    "outputs": [
                        {
                            "internalType": "string",
                            "name": "",
                            "type": "string"
                        }
                    ],
                    "payable": false,
                    "stateMutability": "view",
                    "type": "function"
                }
            ];
            let contIns;
            async function init() {
                web3Ins = new window.Web3(window.ethereum);
                console.log(web3Ins);
                console.log(window);
                let accRes = await window.ethereum.enable();
                console.log(accRes[0]);
                walletAddress = accRes[0];
                web3Ins.eth.getBalance(walletAddress).then(data => {
                    // console.log(err, data);
                    document.getElementById('walletBalanceId').innerText = web3Ins.utils.fromWei(data,'ether');
                })
                document.getElementById('walletAddressId').innerText = walletAddress;
                contIns = new web3Ins.eth.Contract(abi, votingCOntractAddress)
                console.log(contIns)
                noOfVotes()
            }
            init();
            function voting(candName) {
                contIns.methods.voting(candName).send({from: walletAddress})
                .on('receipt', function(receipt){
                    // receipt example
                    console.log(candName)
                    console.log(receipt)
                    noOfVotes();
                    if(receipt.status) {
                        return alert("Success");
                    } else {
                        return alert("fail")
                    }
                })

            }

            function result() {
                contIns.methods.result().call()
                .then(function(result){
                    return alert(result)
                });
            }

            function noOfVotes() {
                contIns.methods.noOfVotes("TRUMP").call()
                .then(function(result){
                    document.getElementById('trumpVoteCount').innerText = result;
                });
                contIns.methods.noOfVotes("BIDEN").call()
                .then(function(result){
                    document.getElementById('bidenVoteCount').innerText = result;
                });
            }
        </script>
        <style>
            body {
                text-align: center;
            }
            img {
                width: 300px;
                height: 400px;
                border-radius: 7px;
            }
            #parentDiv {
                display: flex;
            }
            #trumpdivid {
                margin-left: auto;
                margin-right: 5px;
            }
            #bidendivid {
                margin-right: auto;
                margin-left: 5px;
            }
            button {
                padding: 10px 20px;
                background-color: aqua;
            }

        </style>
    </body>
</html>

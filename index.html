<html>
    <head>
        <title>Voting D-APP</title>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/web3/4.16.0/web3.min.js"></script>
    </head>
    <body>
        <p>ETHEREUM Blockchain Based Voting Platform</p>
        <p>walletAddress: <span id="connAddress"></span></p>
        <div id="parentDiv">
            <div id="trumpdiv">
                <p>TRUMP</p>
                <img src="https://upload.wikimedia.org/wikipedia/commons/1/13/Official_Presidential_Portrait_of_President_Donald_J._Trump_%282025%29_%28cropped%29%282%29.jpg"/>
                <p>No.of votes: <span id="TRUMPVoteCount"></span></p>
                <br/>
                <br/>
                <br/>
                <button onclick="vote('TRUMP')">VOTE</button>
            </div>
            <div id="bidendiv">
                <p>BIDEN</p>
                <img src="https://upload.wikimedia.org/wikipedia/commons/6/68/Joe_Biden_presidential_portrait.jpg"/>
                <p>No.of votes: <span id="BIDENVoteCount"></span></p>
                <br/>
                <br/>
                <br/>
                <button onclick="vote('BIDEN')">VOTE</button>
            </div>
        </div>
        <div id="resultBtnId">
            <button id="resultBtn" onclick="result()">RESULT</button>
        </div>
        <style>
            body {
                text-align: center;
            }
            #parentDiv {
                display: flex;
            }
            #trumpdiv {
                margin-left: auto;
                margin-right: 5px;
            }   
            #bidendiv {
                margin-right: auto;
                margin-left: 5px;
            }
            img {
                width: 300px;
                height: 400px;
            }
            button {
                padding: 12px 24px;
                background: antiquewhite;
                border-radius: 7px;
            }
            #resultBtn {
                background-color: bisque !important;
            }
            #resultBtnId {
                margin-top: 20px;
            }
        </style>
        <script>
            let votingAddress = "0x4196dd655c32d153ab0d92c1687f8524e2c84149";
            let abiJSON = [
                {
                    "constant": false,
                    "inputs": [],
                    "name": "startVoting",
                    "outputs": [],
                    "payable": false,
                    "stateMutability": "nonpayable",
                    "type": "function"
                },
                {
                    "constant": false,
                    "inputs": [
                        {
                            "internalType": "string",
                            "name": "candName",
                            "type": "string"
                        }
                    ],
                    "name": "vote",
                    "outputs": [],
                    "payable": false,
                    "stateMutability": "nonpayable",
                    "type": "function"
                },
                {
                    "inputs": [],
                    "payable": false,
                    "stateMutability": "nonpayable",
                    "type": "constructor"
                },
                {
                    "constant": true,
                    "inputs": [],
                    "name": "getCurrentTime",
                    "outputs": [
                        {
                            "internalType": "uint256",
                            "name": "",
                            "type": "uint256"
                        }
                    ],
                    "payable": false,
                    "stateMutability": "view",
                    "type": "function"
                },
                {
                    "constant": true,
                    "inputs": [
                        {
                            "internalType": "string",
                            "name": "candName",
                            "type": "string"
                        }
                    ],
                    "name": "noOfVotes",
                    "outputs": [
                        {
                            "internalType": "uint256",
                            "name": "",
                            "type": "uint256"
                        }
                    ],
                    "payable": false,
                    "stateMutability": "view",
                    "type": "function"
                },
                {
                    "constant": true,
                    "inputs": [],
                    "name": "result_state",
                    "outputs": [
                        {
                            "internalType": "string",
                            "name": "",
                            "type": "string"
                        }
                    ],
                    "payable": false,
                    "stateMutability": "view",
                    "type": "function"
                }
            ];
            console.log(window);   
            let walletAddress;
            let web3Ins;
            let contractIns;
            async function init() {
                let addressCon = await window.ethereum.enable();
                walletAddress = addressCon[0]; 
                console.log(walletAddress);
                document.getElementById('connAddress').innerHTML = walletAddress;
                web3Ins = new window.Web3(window.ethereum);
                console.log(web3Ins);
                contractIns = new web3Ins.eth.Contract(abiJSON, votingAddress);
                console.log(contractIns);
                updateCurrentVoteCount();
            }
            init();
            function updateCurrentVoteCount() {
                noOfVotes("BIDEN");
                noOfVotes("TRUMP");
            }
            function noOfVotes(candName) {
                contractIns.methods.noOfVotes(candName).call()
                .then(function(result){
                    console.log("candName"+candName+"  votes:"+result);
                    document.getElementById(candName+'VoteCount').innerHTML = result;
                });
            }
            function result() {
                contractIns.methods.result_state().call()
                .then(function(result){
                    return alert(result);
                });
            }

            function vote(candName) {
                contractIns.methods.vote(candName)
                .send({from: walletAddress})
                .on('receipt', function(receipt){
                    if(receipt.status) {
                        updateCurrentVoteCount();
                        return alert("successfully voted!")
                    }
                    else {
                        return alert("Tx failed");
                    }
                })
            }
        </script>
    </body>
</html>

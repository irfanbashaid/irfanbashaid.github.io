<html>
    <head>
        <title>Blockchain based voting</title>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/web3/1.10.4/web3.min.js"></script>
    </head>
    <body>
        <h2>Ethereum based Voting platform</h2>
        <p>wallet Address: <span id="walletId"></span></p>
        <div id="candidateDiv">
            <div id="trumpDiv">
                <p>TRUMP</p>
                <img src="https://upload.wikimedia.org/wikipedia/commons/1/16/Official_Presidential_Portrait_of_President_Donald_J._Trump_%282025%29.jpg" />
                <p>No of votes: <span id="TRUMPVOTECOUNT"></span></p>
        <br/>
        <br/>

                <button onclick="vote('TRUMP')">Vote</button>
            </div>
            <div id="bidenDiv">
                <p>BIDEN</p>
                <img src="https://upload.wikimedia.org/wikipedia/commons/6/68/Joe_Biden_presidential_portrait.jpg"/>
                <p>No of votes: <span id="BIDENVOTECOUNT"></span></p>
        <br/>
        <br/>

                <button onclick="vote('BIDEN')">Vote</button>
            </div>
        </div>
        <br/>
        <br/>
     
        <br/>
        <br/>
        <button onclick="result()">Result</button>
        <style>
            body {
                text-align: center;
            }
            #candidateDiv {
                display: flex;
            }
            #trumpDiv {
                margin-left: auto;
                margin-right: 5px;
            }
            #bidenDiv {
                margin-right: auto;
                margin-left: 5px;
            }
            img {
                width: 300px;
                height: 400px;
            }
            button {
                padding: 10px 20px;
                color: black;
                background-color: red;
            }
        </style>
        <script>
            let accountAddress;
            let web3Ins;
            let jsonInterface = [
	{
		"constant": false,
		"inputs": [],
		"name": "startVoting",
		"outputs": [],
		"payable": false,
		"stateMutability": "nonpayable",
		"type": "function"
	},
	{
		"constant": false,
		"inputs": [
			{
				"internalType": "string",
				"name": "candName",
				"type": "string"
			}
		],
		"name": "voting",
		"outputs": [],
		"payable": false,
		"stateMutability": "nonpayable",
		"type": "function"
	},
	{
		"inputs": [],
		"payable": false,
		"stateMutability": "nonpayable",
		"type": "constructor"
	},
	{
		"constant": true,
		"inputs": [],
		"name": "getBlockchainTime",
		"outputs": [
			{
				"internalType": "uint256",
				"name": "",
				"type": "uint256"
			}
		],
		"payable": false,
		"stateMutability": "view",
		"type": "function"
	},
	{
		"constant": true,
		"inputs": [
			{
				"internalType": "string",
				"name": "",
				"type": "string"
			}
		],
		"name": "isCandidateRegistered",
		"outputs": [
			{
				"internalType": "bool",
				"name": "",
				"type": "bool"
			}
		],
		"payable": false,
		"stateMutability": "view",
		"type": "function"
	},
	{
		"constant": true,
		"inputs": [
			{
				"internalType": "address",
				"name": "",
				"type": "address"
			}
		],
		"name": "isVoted",
		"outputs": [
			{
				"internalType": "bool",
				"name": "",
				"type": "bool"
			}
		],
		"payable": false,
		"stateMutability": "view",
		"type": "function"
	},
	{
		"constant": true,
		"inputs": [
			{
				"internalType": "string",
				"name": "candName",
				"type": "string"
			}
		],
		"name": "noOfVotes",
		"outputs": [
			{
				"internalType": "uint256",
				"name": "",
				"type": "uint256"
			}
		],
		"payable": false,
		"stateMutability": "view",
		"type": "function"
	},
	{
		"constant": true,
		"inputs": [],
		"name": "result",
		"outputs": [
			{
				"internalType": "string",
				"name": "",
				"type": "string"
			}
		],
		"payable": false,
		"stateMutability": "view",
		"type": "function"
	},
	{
		"constant": true,
		"inputs": [
			{
				"internalType": "string",
				"name": "",
				"type": "string"
			}
		],
		"name": "voteCount",
		"outputs": [
			{
				"internalType": "uint256",
				"name": "",
				"type": "uint256"
			}
		],
		"payable": false,
		"stateMutability": "view",
		"type": "function"
	}
];
            let contractAddress = "0x06fd317481FBe896C53D50f4C730163e0a867584";
            function noOfVotes(candName) {
                contractIns.methods.noOfVotes(candName).call()
                .then(function(result){
                    document.getElementById(candName+'VOTECOUNT').innerText = result;
                });
            }

            function result() {
                contractIns.methods.result().call()
                .then(function(result){
                    return alert(result);
                });
            }         
            function checkVotes() {
                noOfVotes("BIDEN");
                noOfVotes("TRUMP");
            }   

            function vote(candName) {
                console.log(candName);
                console.log(contractIns.methods.voting);
                contractIns.methods.voting(candName).send({from: accountAddress})
                .on('receipt', function(receipt){
                    if(receipt.status) {
                        checkVotes();
                        alert("success");
                    } else {
                        alert("Tx fail");
                    }

                })
            }

            async function init() {
                console.log(window);
                let accountres = await window.ethereum.enable();
                accountAddress = accountres[0]; 
                console.log(accountAddress);
                document.getElementById('walletId').innerText = accountAddress;
                web3Ins = new window.Web3(window.ethereum);
                console.log(web3Ins);
                contractIns = new web3Ins.eth.Contract(jsonInterface, contractAddress); 
                console.log(contractIns);
                checkVotes();
            }


            init();
        </script>
    </body>
</html>

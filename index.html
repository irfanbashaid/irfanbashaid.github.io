<html>
    <head>
        <title>
            Voting Platform
        </title>
        <script src="https://cdn.jsdelivr.net/npm/web3@1.10.4/dist/web3.min.js"></script>
    </head>
    <body style="text-align: center;">
        <h2>Ethereum based voting platform</h2>
        <div>
            <p> wallet Address: <span id="walletAddress">...</span> </p>
            <p> wallet Balance: <span id="walletBalance">...</span> ETH</p>
        </div>
        <div style="display: flex;">
            <div style="margin-left: auto; margin-right: 10px;">
                <p>BIDEN</p>
                <img 
                    src="https://upload.wikimedia.org/wikipedia/commons/6/68/Joe_Biden_presidential_portrait.jpg"
                    style="width: 300px; height: 400px; border-radius: 7px;"    
                />
                <p>vote count: <span id="BIDENVOTES">...</span></p>
                <button onclick="voting('BIDEN')" style="padding: 7px 20px;">Vote</button>
            </div>
            <div style="margin-right: auto; margin-left: 10px;">
                <p>TRUMP</p>
                <img 
                    src="https://upload.wikimedia.org/wikipedia/commons/1/16/Official_Presidential_Portrait_of_President_Donald_J._Trump_%282025%29.jpg" 
                    style="width: 300px; height: 400px; border-radius: 7px;"
                />
                <p>vote count: <span id="TRUMPVOTES">...</span></p>
                <button onclick="voting('TRUMP')" style="padding: 7px 20px;">Vote</button>
            </div>
        </div>
        <br/>
        <br/>
        <br/>
        <div>
            <button onclick="result_state()" style="padding: 7px 20px;">Check Result State</button>
        </div>
        <script>
            let ABIJSON = [
                {
                    "constant": false,
                    "inputs": [],
                    "name": "startVoting",
                    "outputs": [],
                    "payable": false,
                    "stateMutability": "nonpayable",
                    "type": "function"
                },
                {
                    "constant": false,
                    "inputs": [
                        {
                            "name": "candName",
                            "type": "string"
                        }
                    ],
                    "name": "voting",
                    "outputs": [],
                    "payable": false,
                    "stateMutability": "nonpayable",
                    "type": "function"
                },
                {
                    "inputs": [],
                    "payable": false,
                    "stateMutability": "nonpayable",
                    "type": "constructor"
                },
                {
                    "constant": true,
                    "inputs": [],
                    "name": "getBlockchainTime",
                    "outputs": [
                        {
                            "name": "",
                            "type": "uint256"
                        }
                    ],
                    "payable": false,
                    "stateMutability": "view",
                    "type": "function"
                },
                {
                    "constant": true,
                    "inputs": [
                        {
                            "name": "candName",
                            "type": "string"
                        }
                    ],
                    "name": "noOfVotes",
                    "outputs": [
                        {
                            "name": "",
                            "type": "uint256"
                        }
                    ],
                    "payable": false,
                    "stateMutability": "view",
                    "type": "function"
                },
                {
                    "constant": true,
                    "inputs": [],
                    "name": "result_state",
                    "outputs": [
                        {
                            "name": "",
                            "type": "string"
                        }
                    ],
                    "payable": false,
                    "stateMutability": "view",
                    "type": "function"
                },
                {
                    "constant": true,
                    "inputs": [
                        {
                            "name": "",
                            "type": "address"
                        }
                    ],
                    "name": "votersMap",
                    "outputs": [
                        {
                            "name": "",
                            "type": "bool"
                        }
                    ],
                    "payable": false,
                    "stateMutability": "view",
                    "type": "function"
                }
            ];
            let contractAddress = "0xafff73d21dab3192d5c86222668a7a91973ed872";
            let walletAddress;
            let walletBalance;
            let contractIns;
            let web3Ins;
            function noOfVotes(candName) {
                contractIns.methods.noOfVotes(candName).call(function(err,result){
                    document.getElementById(candName+"VOTES").innerHTML = result; 
                })
            }

            function result_state() {
                contractIns.methods.result_state().call(function(err,result){
                    alert(result); 
                })
            }

            function voting(candName) {
                contractIns.methods.voting(candName).send({from:walletAddress}).on('receipt', function(receipt){
                    noOfVotes("TRUMP");
                    noOfVotes("BIDEN");
                    if(receipt.status) {
                        return alert("successfully voted");
                    } else {
                        return alert("Transaction failed!");
                    } 
                    
                })
            }
            async function init() {
                console.log(window);
                let accRes = await window.ethereum.enable();
                walletAddress = accRes[0];
                document.getElementById('walletAddress').innerHTML = walletAddress;
                web3Ins = new window.Web3(window.ethereum);
                web3Ins.eth.getBalance(walletAddress).then(result=> {
                    walletBalance = web3Ins.utils.fromWei(result, 'ether');
                    console.log(walletBalance);
                    document.getElementById('walletBalance').innerHTML = walletBalance; 
                })
                contractIns = new web3Ins.eth.Contract(ABIJSON, contractAddress);
                console.log(contractIns);
                noOfVotes("BIDEN");
                noOfVotes("TRUMP");
                // voting(string memory )
                // ()
            }
            init();
        </script>
    </body>
</html>

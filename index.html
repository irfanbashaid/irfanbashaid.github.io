<html>
    <head>
        <title>Ethereum Voting</title>
        <script src="https://cdn.jsdelivr.net/npm/web3@4.16.0/dist/web3.min.js"></script>
    </head>
    <body style="text-align: center;">
        <h2>Ethereum based voting platform</h2>
        <div>
            <p>Wallet Address:<span id="walletAddress">...</span></p>
            <p>wallet balance:<span id="walletBalance">...</span></p>
            <div id="candidateDiv">
                <div id="TRUMPDIV">
                    <p>Trump</p>
                    <img src="https://upload.wikimedia.org/wikipedia/commons/1/16/Official_Presidential_Portrait_of_President_Donald_J._Trump_%282025%29.jpg" />
                    <p>No of votes received: <span id="TRUMPVOTES">...</span></p>
                    <button onclick="vote('TRUMP')">Vote</button>
                </div>
                <div id="BIDENDIV">
                    <p>Biden</p>
                    <img src="https://upload.wikimedia.org/wikipedia/commons/6/68/Joe_Biden_presidential_portrait.jpg" />
                    <p>No of votes received: <span id="BIDENVOTES">...</span></p>
                    <button onclick="vote('BIDEN')">Vote</button>
                </div>
            </div>
            <div>
                <button style="background-color: orangered;" onclick="getState()">Get State</button>
            </div>
        </div>
        <style>
            #candidateDiv {
                display: flex;
                margin-top: 20px;
                margin-bottom: 20px;
            }
            #TRUMPDIV {
                margin-left: auto;
                margin-right: 10px;
            }
            #BIDENDIV {
                margin-right: auto;
                margin-left: 10px;
            }
            img {
                width: 300px;
                height: 400px;
                border-radius: 7px;
            }
            button{
                padding: 10px;
                background-color: rosybrown;
                border-radius: 7px;
            }
        </style>
        <script>
            let web3Instance
            let accAddr = '';
            let walletBalance = '';
            let contractAddress = '0x44dC869FD4E3a558FF859e363888A2F08721250e';
            let jsonInterface = [
                {
                "inputs": [],
                "payable": false,
                "stateMutability": "nonpayable",
                "type": "constructor"
                },
                {
                "constant": true,
                "inputs": [
                {
                "internalType": "string",
                "name": "",
                "type": "string"
                }
                ],
                "name": "candidateVotes",
                "outputs": [
                {
                "internalType": "uint256",
                "name": "",
                "type": "uint256"
                }
                ],
                "payable": false,
                "stateMutability": "view",
                "type": "function"
                },
                {
                "constant": true,
                "inputs": [],
                "name": "electionState",
                "outputs": [
                {
                "internalType": "string",
                "name": "",
                "type": "string"
                }
                ],
                "payable": false,
                "stateMutability": "view",
                "type": "function"
                },
                {
                "constant": true,
                "inputs": [],
                "name": "getBlockchainTime",
                "outputs": [
                {
                "internalType": "uint256",
                "name": "",
                "type": "uint256"
                }
                ],
                "payable": false,
                "stateMutability": "view",
                "type": "function"
                },
                {
                "constant": false,
                "inputs": [],
                "name": "startVoting",
                "outputs": [],
                "payable": false,
                "stateMutability": "nonpayable",
                "type": "function"
                },
                {
                "constant": false,
                "inputs": [
                {
                "internalType": "string",
                "name": "candName",
                "type": "string"
                }
                ],
                "name": "voting",
                "outputs": [],
                "payable": false,
                "stateMutability": "nonpayable",
                "type": "function"
                }
            ];

            var myContract;
            function setBalance(balance) {
                walletBalance = web3Instance.utils.fromWei(balance, 'ether');
                document.getElementById("walletBalance").innerHTML = walletBalance + " ETH"; 

            }

            function candidateVotes(candName){
                myContract.methods.candidateVotes(candName).call()
                .then(function(voteCount){
                    document.getElementById(candName+"VOTES").innerHTML = voteCount;
                });
            }
            function vote(candName) {
                myContract.methods.voting(candName).send({from: accAddr})
                .on('receipt', function(receipt){
                    console.log(receipt);
                    if(receipt.status) {
                        fetchVotes();
                        return alert("Successfully voted");
                    }
                })
            }

            function getState() {
                myContract.methods.electionState().call()
                .then(function(result){
                    return alert(result);
                });
            }

            function fetchVotes() {
                candidateVotes("BIDEN");
                candidateVotes("TRUMP");
            }
            async function init() {
                console.log(window);
                web3Instance = new window.Web3(window.ethereum);
                console.log(web3Instance);
                let accConn = await window.ethereum.enable();
                accAddr = accConn[0];
                console.log(accAddr);
                document.getElementById("walletAddress").innerHTML = accAddr; 
                web3Instance.eth.getBalance(accAddr).then(balance => setBalance(balance));

                myContract = new web3Instance.eth.Contract(jsonInterface, contractAddress);
                console.log(myContract);
                fetchVotes();

            }
            init();
        </script>
    </body>
</html>
